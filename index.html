<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>SSE Demo</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }
        button {
            padding: 10px 16px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }
        ul {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <button id="connectButton">Connect</button>
    <button id="triggerButton" style="display: none;">Trigger Message</button>

    <ul id="messages"></ul>

    <script>
        let es = null;

        const connectButton = document.getElementById('connectButton');
        const triggerButton = document.getElementById('triggerButton');
        const messages = document.getElementById('messages');

        function addMessage(text) {
            const li = document.createElement('li');
            li.textContent = text;
            messages.appendChild(li);
        }

        function connect() {
            es = new EventSource('http://localhost:4000/events');

            es.onopen = () => {
                connectButton.textContent = 'Connected';
                triggerButton.style.display = 'inline-block';
                addMessage('CONNECTED');
            };

            es.onmessage = (event) => {
                addMessage(event.data);
            };

            es.onerror = () => {
                addMessage('ERROR');
            };
        }

        function disconnect() {
            if (!es) return;
            es.close();
            es = null;
            connectButton.textContent = 'Connect';
            triggerButton.style.display = 'none';
        }

        function triggerMessage() {
            fetch('http://localhost:4000/trigger-message')
                .then(() => addMessage('Triggered request'))
                .catch(() => addMessage('Trigger error'));
        }

        function handleClick() {
            if (es) {
                disconnect();
            } else {
                connect();
            }
        }

        connectButton.addEventListener('click', handleClick);
        triggerButton.addEventListener('click', triggerMessage);
    </script>
</body>
</html>
