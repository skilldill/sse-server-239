<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>SSE example</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        button {
            padding: 10px 16px;
            font-size: 16px;
            cursor: pointer;
        }

        ul {
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <button id="connectButton">Connect</button>
    <ul id="messages"></ul>

    <script>
        let sseClient;

        const connectButton = document.getElementById('connectButton');
        const messagsseClient = document.getElementById('messages');

        function addMessage(text) {
            const li = document.createElement('li');
            li.textContent = text;
            messages.appendChild(li);
        }

        function connect() {
            sseClient = new EventSource('http://localhost:4000/events');

            sseClient.onopen = () => {
                connectButton.textContent = 'Connected';
                addMessage('CONNECTED');
            };

            sseClient.onmessage = (event) => {
                addMessage(event.data);
            };

            sseClient.onerror = () => {
                addMessage('ERROR');
            };
        }

        function disconnect() {
            if (!sseClient) return;
            sseClient.close();
            sseClient = null;
            connectButton.textContent = 'Connect';
        }

            if (es) {
                disconnect();
            } else {
                connect();
            }
        }

        connectButton.addEventListener('click', handleClick);
    </script>
</body>

</html>
